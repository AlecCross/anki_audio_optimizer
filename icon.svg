<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Glassmorphic Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.15" />

  <!-- Waveform Icon with Glow -->
  <g filter="url(#glow)" fill="url(#waveGrad)">
    <!-- Bar 1 -->
    <rect x="100" y="216" width="24" height="80" rx="12" />
    <!-- Bar 2 -->
    <rect x="148" y="156" width="24" height="200" rx="12" />
    <!-- Bar 3 -->
    <rect x="196" y="96" width="24" height="320" rx="12" />
    <!-- Bar 4 -->
    <rect x="244" y="136" width="24" height="240" rx="12" />
    <!-- Bar 5 -->
    <rect x="292" y="176" width="24" height="160" rx="12" />
    <!-- Bar 6 -->
    <rect x="340" y="116" width="24" height="280" rx="12" />
    <!-- Bar 7 -->
    <rect x="388" y="206" width="24" height="100" rx="12" />
  </g>

  <!-- Scissors Cut Overlay Indicator -->
  <path d="M 230,340 C 220,340 210,350 210,360 C 210,370 220,380 230,380 C 240,380 245,370 248,365 L 256,356 L 264,365 C 267,370 272,380 282,380 C 292,380 302,370 302,360 C 302,350 292,340 282,340 C 272,340 264,350 260,354 L 256,350 L 252,354 C 248,350 240,340 230,340 Z M 230,352 C 235,352 238,355 240,358 L 235,368 C 232,368 230,365 230,360 C 230,355 232,352 230,352 Z M 282,352 C 282,352 280,355 282,360 C 282,365 280,368 277,368 L 272,358 C 274,355 277,352 282,352 Z" fill="#ffffff" opacity="0.9" />
</svg>
